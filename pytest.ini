[tool:pytest]
# Pytest configuration for PII redaction tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Add project root to Python path
pythonpath = .

# Test output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Custom markers
markers =
    pii_redaction: Tests related to PII redaction middleware
    slow: Tests that take longer to run
    integration: Integration tests that require database
    unit: Unit tests that don't require external dependencies

# Test directories
testpaths = tests

# Minimum version
minversion = 6.0

# Filter warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning